name: VideoSlicer
options:
  bundleIdPrefix: com.ehsan
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.ehsan.VideoSlicer
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_TESTABILITY: "YES"
    # Simulator builds skip signing (no Apple developer team required for tests).
    # Device builds use automatic signing — set DEVELOPMENT_TEAM below to your
    # Apple Developer team ID (found at developer.apple.com → Membership, or in
    # Xcode → Settings → Accounts → your Apple ID → Manage Certificates).
    "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": ""
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "3722N4CJWT"

targets:
  VideoSlicer:
    type: application
    platform: iOS
    sources:
      - path: VideoSlicer
        excludes:
          - "**/*.md"
    resources:
      - VideoSlicer/Resources/Assets.xcassets
    info:
      path: VideoSlicer/Resources/Info.plist
      properties:
        CFBundleName: VideoSlicer
        CFBundleDisplayName: VideoSlicer
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPhotoLibraryUsageDescription: "VideoSlicer needs access to your photo library to select videos for slicing."
        NSPhotoLibraryAddUsageDescription: "VideoSlicer saves sliced video clips."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: false
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"

  VideoSlicerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VideoSlicerTests
    dependencies:
      - target: VideoSlicer
    settings:
      base:
        INFOPLIST_FILE: VideoSlicerTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ehsan.VideoSlicerTests

  VideoSlicerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - VideoSlicerUITests
    dependencies:
      - target: VideoSlicer
    settings:
      base:
        INFOPLIST_FILE: VideoSlicerUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ehsan.VideoSlicerUITests

schemes:
  VideoSlicer:
    build:
      targets:
        VideoSlicer: all
        VideoSlicerTests: [test]
        VideoSlicerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: VideoSlicerTests
          parallelizable: true
        - name: VideoSlicerUITests
    profile:
      config: Release
    archive:
      config: Release
